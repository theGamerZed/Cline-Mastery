{% extends "base.html" %}

{% block title %}Edit Item - Movie & Series Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">
                    <i class="bi bi-pencil"></i> Edit Movie or Series
                </h4>
            </div>
            
            <div class="card-body">
                <form action="{{ url_for('edit_item', id=item.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title *</label>
                        <input type="text" class="form-control" id="title" name="title" required 
                               value="{{ item.title }}" placeholder="Enter title">
                    </div>
                    
                    <div class="mb-3">
                        <label for="type" class="form-label">Type *</label>
                        <select class="form-select" id="type" name="type" required>
                            <option value="movie" {% if item.type == 'movie' %}selected{% endif %}>Movie</option>
                            <option value="series" {% if item.type == 'series' %}selected{% endif %}>Series</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="genre" class="form-label">Genre</label>
                        <input type="text" class="form-control" id="genre" name="genre" 
                               value="{{ item.genre or '' }}" placeholder="e.g., Action, Drama, Comedy">
                    </div>
                    
                    <div class="mb-3">
                        <label for="release_year" class="form-label">Release Year</label>
                        <input type="number" class="form-control" id="release_year" name="release_year" 
                               min="1900" max="2099" value="{{ item.release_year or '' }}" placeholder="e.g., 2024">
                    </div>
                    
                    <div class="mb-3">
                        <label for="rating" class="form-label">Rating (1-10)</label>
                        <input type="number" class="form-control" id="rating" name="rating" 
                               min="1" max="10" step="0.1" value="{{ item.rating or '' }}" placeholder="e.g., 8.5">
                    </div>
                    
                    <div class="mb-3">
                        <label for="duration" class="form-label">Duration</label>
                        <input type="text" class="form-control" id="duration" name="duration" 
                               value="{{ item.duration or '' }}" placeholder="e.g., 2h 30min or 10 episodes">
                    </div>
                    
                    <div class="mb-3">
                        <label for="poster_url" class="form-label">Poster URL</label>
                        <input type="url" class="form-control" id="poster_url" name="poster_url" 
                               value="{{ item.poster_url or '' }}" placeholder="https://example.com/poster.jpg">
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4" 
                                  placeholder="Enter description...">{{ item.description or '' }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-save"></i> Update Item
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
