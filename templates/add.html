{% extends "base.html" %}

{% block title %}Add New Item - Movie & Series Tracker{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const typeSelect = document.getElementById('type');
    const episodesGroup = document.getElementById('episodes-group');
    const durationLabel = document.getElementById('duration-label');
    const durationInput = document.getElementById('duration');
    const durationHelp = document.getElementById('duration-help');

    function toggleFields() {
        const selectedType = typeSelect.value;
        if (selectedType === 'anime' || selectedType === 'series') {
            episodesGroup.style.display = 'block';
            durationLabel.textContent = 'Duration (minutes)';
            durationInput.placeholder = 'e.g., 24';
            durationHelp.textContent = 'Duration in minutes per episode';
            durationInput.type = 'number';
            durationInput.min = '1';
            durationInput.step = '1';
        } else {
            episodesGroup.style.display = 'none';
            durationLabel.textContent = 'Duration (minutes)';
            durationInput.placeholder = 'e.g., 120';
            durationHelp.textContent = 'Duration in minutes';
            durationInput.type = 'number';
            durationInput.min = '1';
            durationInput.step = '1';
        }
    }

    typeSelect.addEventListener('change', toggleFields);
    toggleFields();
});
</script>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="bi bi-plus-circle"></i> Add New Movie or Series
                </h4>
            </div>
            
            <div class="card-body">
                <form action="{{ url_for('add_item') }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title *</label>
                        <input type="text" class="form-control" id="title" name="title" required 
                               placeholder="Enter title">
                    </div>
                    
                    <div class="mb-3">
                        <label for="type" class="form-label">Type *</label>
                        <select class="form-select" id="type" name="type" required>
                            <option value="">Select type...</option>
                            <option value="movie">Movie</option>
                            <option value="series">Series</option>
                            <option value="anime">Anime</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="genre" class="form-label">Genre</label>
                        <input type="text" class="form-control" id="genre" name="genre" 
                               placeholder="e.g., Action, Drama, Comedy">
                    </div>
                    
                    <div class="mb-3">
                        <label for="release_year" class="form-label">Release Year</label>
                        <input type="number" class="form-control" id="release_year" name="release_year" 
                               min="1900" max="2099" placeholder="e.g., 2024">
                    </div>
                    
                    <div class="mb-3">
                        <label for="rating" class="form-label">Rating (1-10)</label>
                        <input type="number" class="form-control" id="rating" name="rating" 
                               min="1" max="10" step="0.1" placeholder="e.g., 8.5">
                    </div>
                    
                    <div class="mb-3">
                        <label for="duration" id="duration-label" class="form-label">Duration (minutes)</label>
                        <input type="number" class="form-control" id="duration" name="duration" 
                               min="1" step="1" placeholder="e.g., 120">
                        <div class="form-text" id="duration-help">Duration in minutes</div>
                    </div>
                    
                    <div class="mb-3" id="episodes-group" style="display: none;">
                        <label for="episodes" class="form-label">Number of Episodes</label>
                        <input type="number" class="form-control" id="episodes" name="episodes" 
                               min="1" step="1" placeholder="e.g., 24">
                        <div class="form-text">Total number of episodes</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="poster_url" class="form-label">Poster URL</label>
                        <input type="url" class="form-control" id="poster_url" name="poster_url" 
                               placeholder="https://example.com/poster.jpg">
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4" 
                                  placeholder="Enter description..."></textarea>
                    </div>

                    <hr class="my-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold">After saving, also:</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="watchlist_action" id="actionJustSave" value="just_save" checked>
                            <label class="form-check-label" for="actionJustSave">
                                <i class="bi bi-floppy"></i> Just save — no watchlist entry
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="watchlist_action" id="actionAddWatchlist" value="add_to_watchlist">
                            <label class="form-check-label" for="actionAddWatchlist">
                                <i class="bi bi-plus-circle"></i> Save & add to watchlist
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="watchlist_action" id="actionMarkWatched" value="mark_watched">
                            <label class="form-check-label" for="actionMarkWatched">
                                <i class="bi bi-check-circle"></i> Save & mark as watched
                            </label>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Save Item
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
